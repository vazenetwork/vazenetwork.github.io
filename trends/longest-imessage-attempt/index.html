<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chain Viewer</title>
</head>

<body>
<h2>Loading...</h2>
<pre id="out"></pre>

<script>
const base = window.location.pathname.replace("index.html", "");

fetch(base + "/raw.txt")
    .then(r => r.text())
    .then(t => {
        document.getElementById("out").textContent = t;
    });
</script>

</body>
</html>
